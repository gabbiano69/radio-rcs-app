name: Build Android APK & AAB + Web Export

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate App Icons
        run: |
          set -e
          if [ -f "public/logo-rcs.png" ]; then
            mkdir -p assets
            cp public/logo-rcs.png assets/icon-only.png
            cp public/logo-rcs.png assets/icon-foreground.png
            cp public/logo-rcs.png assets/icon-background.png
            npx @capacitor/assets generate --android
          fi

      # BUILD PER ANDROID
      - name: Build for Android
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Capacitor Sync
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Build Android APK & AAB (Debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          ./gradlew bundleDebug

      # PREPARAZIONE CARTELLA ARTIFACT WEB
      - name: Prepare Web Artifact Folder
        run: mkdir -p final-web-export

      # BUILD PER WEB (Cartella Principale / Root)
      - name: Build for Web (Root)
        run: |
          rm -rf out
          npm run build
          echo '<IfModule mod_rewrite.c>
          RewriteEngine On
          RewriteBase /
          RewriteRule ^index\.html$ - [L]
          RewriteCond %{REQUEST_FILENAME} !-f
          RewriteCond %{REQUEST_FILENAME} !-d
          RewriteRule . /index.html [L]
          </IfModule>' > out/.htaccess
          mkdir -p final-web-export/ROOT-dominio-principale
          cp -r out/* final-web-export/ROOT-dominio-principale/
        env:
          NEXT_PUBLIC_BASE_PATH: ''
          NEXT_TELEMETRY_DISABLED: 1

      # BUILD PER WEB (Sottocartella /rcs)
      - name: Build for Web (Subfolder /rcs)
        run: |
          rm -rf out
          npm run build
          echo '<IfModule mod_rewrite.c>
          RewriteEngine On
          RewriteBase /rcs/
          RewriteRule ^index\.html$ - [L]
          RewriteCond %{REQUEST_FILENAME} !-f
          RewriteCond %{REQUEST_FILENAME} !-d
          RewriteRule . /rcs/index.html [L]
          </IfModule>' > out/.htaccess
          mkdir -p final-web-export/SUBFOLDER-rcs
          cp -r out/* final-web-export/SUBFOLDER-rcs/
        env:
          NEXT_PUBLIC_BASE_PATH: /rcs
          NEXT_TELEMETRY_DISABLED: 1

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Radio-RCS-Sicilia-Full-Package
          path: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/bundle/debug/*.aab
            final-web-export/
