name: Build Android APK & AAB + Web Export

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate App Icons
        run: |
          set -e
          if [ -f "public/logo-rcs.png" ]; then
            mkdir -p assets
            cp public/logo-rcs.png assets/icon-only.png
            cp public/logo-rcs.png assets/icon-foreground.png
            cp public/logo-rcs.png assets/icon-background.png
            npx @capacitor/assets generate --android
          fi

      # 1. BUILD ANDROID
      - name: Build for Android
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Capacitor Sync
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Build Android APK & AAB
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          ./gradlew bundleDebug

      # 2. PREPARAZIONE STAGING AREA (Per avere uno ZIP pulito)
      - name: Create Release Folder
        run: |
          mkdir -p release/android
          mkdir -p release/web/ROOT-dominio-principale
          mkdir -p release/web/SUBFOLDER-rcs

      # 3. COPIA ANDROID ARTIFACTS
      - name: Copy Android Files
        run: |
          cp android/app/build/outputs/apk/debug/*.apk release/android/
          cp android/app/build/outputs/bundle/debug/*.aab release/android/

      # 4. BUILD WEB (Root)
      - name: Build Web Root
        run: |
          rm -rf out
          export NEXT_PUBLIC_BASE_PATH=""
          npm run build
          echo '<IfModule mod_rewrite.c>
          RewriteEngine On
          RewriteBase /
          RewriteRule ^index\.html$ - [L]
          RewriteCond %{REQUEST_FILENAME} !-f
          RewriteCond %{REQUEST_FILENAME} !-d
          RewriteRule . /index.html [L]
          </IfModule>' > out/.htaccess
          cp -r out/* release/web/ROOT-dominio-principale/
        env:
          NEXT_TELEMETRY_DISABLED: 1

      # 5. BUILD WEB (Subfolder /rcs)
      - name: Build Web Subfolder
        run: |
          rm -rf out
          export NEXT_PUBLIC_BASE_PATH="/rcs"
          npm run build
          echo '<IfModule mod_rewrite.c>
          RewriteEngine On
          RewriteBase /rcs/
          RewriteRule ^index\.html$ - [L]
          RewriteCond %{REQUEST_FILENAME} !-f
          RewriteCond %{REQUEST_FILENAME} !-d
          RewriteRule . /rcs/index.html [L]
          </IfModule>' > out/.htaccess
          cp -r out/* release/web/SUBFOLDER-rcs/
        env:
          NEXT_TELEMETRY_DISABLED: 1

      # 6. CARICAMENTO ARTIFACT
      - name: Upload Package
        uses: actions/upload-artifact@v4
        with:
          name: Radio-RCS-Sicilia-FULL-RELEASE
          path: release/
