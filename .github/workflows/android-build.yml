name: Build Android APK & AAB + Web Export

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate App Icons
        run: |
          set -e
          if [ -f "public/logo-rcs.png" ]; then
            echo "Generating icons from public/logo-rcs.png..."
            mkdir -p assets
            # Prepariamo i layer per capacitor-assets
            cp public/logo-rcs.png assets/icon-only.png
            cp public/logo-rcs.png assets/icon-foreground.png
            cp public/logo-rcs.png assets/icon-background.png
            
            # Eseguiamo la generazione specifica per Android
            npx @capacitor/assets generate --android
            
            echo "Verifica icone generate:"
            ls -R android/app/src/main/res/mipmap-* | grep ic_launcher || echo "Attenzione: icone non trovate"
          else
            echo "ERRORE: public/logo-rcs.png non trovato! Impossibile generare le icone corrette."
            exit 1
          fi

      - name: Upload Icons Artifact (per ispezione)
        uses: actions/upload-artifact@v4
        with:
          name: App-Icons
          path: |
            android/app/src/main/res/mipmap-*
            assets/

      - name: Build Static Web App
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Capacitor Sync
        run: |
          mkdir -p out
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Patch Android Manifest for Stores & Fire TV
        run: |
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST_PATH" ]; then
            sed -i 's/<application/<application android:usesCleartextTraffic="true" android:banner="@mipmap\/ic_launcher"/' $MANIFEST_PATH
            sed -i '/<\/manifest>/i \    <uses-feature android:name="android.hardware.touchscreen" android:required="false" \/>' $MANIFEST_PATH
            sed -i '/<\/manifest>/i \    <uses-feature android:name="android.software.leanback" android:required="false" \/>' $MANIFEST_PATH
            sed -i '/<category android:name="android.intent.category.LAUNCHER" \/>/a \                <category android:name="android.intent.category.LEANBACK_LAUNCHER" \/>' $MANIFEST_PATH
            echo "Manifest patched"
          fi

      - name: Build Android APK & AAB (Debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          ./gradlew bundleDebug

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Radio-RCS-Sicilia-Build
          path: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/bundle/debug/*.aab
            out/
