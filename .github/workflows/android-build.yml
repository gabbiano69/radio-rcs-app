name: Build Android & Web Export (Aruba Optimized)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate App Icons
        run: |
          if [ -f "public/logo-rcs.png" ]; then
            mkdir -p assets
            cp public/logo-rcs.png assets/icon-only.png
            cp public/logo-rcs.png assets/icon-foreground.png
            cp public/logo-rcs.png assets/icon-background.png
            npx @capacitor/assets generate --android
          fi

      - name: Create Staging Area
        run: |
          mkdir -p release/android
          mkdir -p release/web/ROOT-dominio-principale
          mkdir -p release/web/SUBFOLDER-rcs

      # 1. BUILD ANDROID
      - name: Build for Android
        run: |
          npm run build
          if [ ! -d "android" ]; then npx cap add android; fi
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          ./gradlew bundleDebug
          cp app/build/outputs/apk/debug/*.apk ../release/android/
          cp app/build/outputs/bundle/debug/*.aab ../release/android/
        env:
          NEXT_TELEMETRY_DISABLED: 1

      # 2. BUILD WEB (ROOT)
      - name: Build Web Root
        run: |
          rm -rf out
          export NEXT_PUBLIC_BASE_PATH=""
          npm run build
          cp -r public/* out/ 2>/dev/null || true
          cat > out/.htaccess << 'EOF'
          ErrorDocument 404 /index.html
          <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /
            RewriteRule ^index\.html$ - [L]
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule . /index.html [L]
          </IfModule>
          EOF
          cp -r out/* release/web/ROOT-dominio-principale/
        env:
          NEXT_TELEMETRY_DISABLED: 1

      # 3. BUILD WEB (SUBFOLDER /rcs)
      - name: Build Web Subfolder
        run: |
          rm -rf out
          export NEXT_PUBLIC_BASE_PATH="/rcs"
          npm run build
          cp -r public/* out/ 2>/dev/null || true
          cat > out/.htaccess << 'EOF'
          ErrorDocument 404 /rcs/index.html
          <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /rcs/
            RewriteRule ^index\.html$ - [L]
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule . /rcs/index.html [L]
          </IfModule>
          EOF
          cp -r out/* release/web/SUBFOLDER-rcs/
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Radio-RCS-Sicilia-FULL-RELEASE
          path: release/
