name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Static Web App
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Capacitor Sync
        run: |
          mkdir -p out
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Patch Android Manifest for Cleartext Traffic
        run: |
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST_PATH" ]; then
            # Rimuove eventuali attributi esistenti per evitare duplicati e aggiunge quello corretto
            sed -i 's/android:usesCleartextTraffic="[^"]*"//g' $MANIFEST_PATH
            sed -i 's/<application/<application android:usesCleartextTraffic="true"/' $MANIFEST_PATH
            echo "Manifest patched successfully with usesCleartextTraffic=true"
          else
            echo "Manifest not found at $MANIFEST_PATH"
            exit 1
          fi

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
